<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Activated</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #4c6ef5 0%, #5c5adb 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .container {
      background: white;
      border-radius: 8px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      width: 100%;
      max-width: 400px;
      padding: 48px 32px;
      text-align: center;
    }

    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      background-color: #d3f9d8;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #1a1b1e;
      margin-bottom: 16px;
      letter-spacing: -0.5px;
    }

    p {
      color: #868e96;
      font-size: 14px;
      font-weight: 400;
      line-height: 1.55;
      margin-bottom: 24px;
    }

    .success-alert {
      background-color: #d3f9d8;
      color: #2b6137;
      padding: 16px;
      border-radius: 4px;
      border: 1px solid #b2f2bb;
      margin-bottom: 24px;
      font-size: 14px;
      line-height: 1.55;
    }

    a {
      display: inline-block;
      padding: 10px 24px;
      background: linear-gradient(135deg, #4c6ef5 0%, #5c5adb 100%);
      color: white;
      text-decoration: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(76, 110, 245, 0.3);
      background: linear-gradient(135deg, #3d5af5 0%, #4c4adb 100%);
    }

    a:active {
      transform: translateY(0);
    }

    @media (max-width: 480px) {
      .container {
        padding: 32px 24px;
      }

      h1 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">✓</div>
    <h1>Account Activated</h1>
    <div class="success-alert">
      <p style="margin: 0;">Your account has been successfully activated!</p>
    </div>
    <p>You can now sign in with your password.</p>
    <a href="/">Go to Login</a>
  </div>
</body>
</html>
