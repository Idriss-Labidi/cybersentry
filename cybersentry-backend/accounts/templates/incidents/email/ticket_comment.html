<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #2196F3; color: white; padding: 20px; border-radius: 5px; margin-bottom: 20px; }
        .content { padding: 20px; background: #f9f9f9; border-radius: 5px; }
        .footer { text-align: center; margin-top: 20px; color: #777; font-size: 12px; }
        .button { display: inline-block; background: #2196F3; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; }
        .comment-box { background: white; padding: 15px; border-left: 4px solid #2196F3; margin: 15px 0; }
        .info-row { margin-bottom: 15px; }
        .label { font-weight: bold; color: #555; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>💬 New Comment on Ticket</h2>
        </div>
        <div class="content">
            <p>Hi,</p>
            <p><strong>{{ author }}</strong> has added a new comment to the ticket:</p>

            <div class="info-row">
                <span class="label">Ticket:</span> {{ ticket_title }}
            </div>

            <div class="comment-box">
                <p>Comment content will appear here</p>
            </div>

            <p style="margin-top: 30px;">
                <a href="{{ ticket_url }}" class="button">View Ticket & Comments</a>
            </p>

            <p>Best regards,<br>CyberSentry Team</p>
        </div>
        <div class="footer">
            <p>This is an automated notification. Please do not reply to this email.</p>
        </div>
    </div>
</body>
</html>
